<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snackademic</title>
    <link rel="stylesheet" href="css/menu.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <script src="menu.js" defer></script>
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <nav class="nav">
          <ul class="nav-list">
            <li>
              <a href="#" class="nav-link">
                <img
                  src="https://img.icons8.com/?size=100&id=7820&format=png&color=FFFFFF"
                  alt="Profile icon"
              /></a>
            </li>
          </ul>
        </nav>
      </div>

      <div class="header-center">
        <a href="index.html" class="logo">
          <img
            src="image/snackademic.png"
            alt="Snackademic logo"
            class="logo-img"
          />
        </a>
      </div>

      <div class="header-right">
        <nav class="nav">
          <ul class="nav-list">
            <li>
              <a href="#" class="nav-link"
                ><img
                  src="https://img.icons8.com/?size=100&id=qFSLWFSEYvcw&format=png&color=FFFFFF"
                  alt="Saved icon"
              /></a>
            </li>

            <li>
              <a href="#" id="menu-toggle" class="nav-link"
                ><img
                  src="https://img.icons8.com/?size=100&id=36389&format=png&color=FFFFFF"
                  alt="Menu icon"
              /></a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="menu" id="slide-menu">
      <button class="menu-close" id="closebtn">
        <img
          src="https://img.icons8.com/?size=100&id=17145&format=png&color=000000"
          alt=""
        />
      </button>
      <h2 class="josefin-sans-medium">What are you hungry for?</h2>
      <button class="category-button josefin-sans-medium">Brekfast</button>
      <button class="category-button josefin-sans-medium">Lunch</button>
      <button class="category-button josefin-sans-medium">Dinner</button>
      <button class="category-button josefin-sans-medium">Dessert</button>

      <div class="join-us josefin-sans-light">
        <h4>JOIN US</h4>
        <input type="email" placeholder="e-mail address" />
        <button id="join-button" class="josefin-sans-light">send</button>
      </div>
    </div>
  </body>
</html>
